  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 --maxw-prose: 64ch;\n  --maxw-page:  1180px;\n\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);\n  --dur:  0.45s;\n}\n\n/* ---- Semantic tokens — DARK ------------------------------ */\n:root[data-theme=\"dark\"] {\n  --bg:        var(--carvao-900);\n  --surface:   var(--carvao-800);\n  --surface-2: var(--carvao-700);\n  --card:      var(--carvao-800);\n  --border:    var(--carvao-600);\n  --border-strong: #56493A;\n\n  --fg1: #F3ECDD;\n  --fg2: #C9BFA9;\n  --fg3: #97907E;\n\n  --accent:       var(--toca-gold);        /* brighter gold on dark */\n  --accent-quiet: var(--toca-gold-soft);\n  --link:         var(--oceano-300);\n\n  --band: var(--carvao-900);    /* seamless black bands in dark */\n\n  --ocean:  var(--oceano-300);\n  --nature: var(--natureza-300);\n  --sunset: var(--sol-300);\n\n  --on-accent: var(--carvao-900);\n\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-md: 0 10px 28px rgba(0,0,0,0.5);\n  --shadow-lg: 0 28px 64px rgba(0,0,0,0.6);\n  --shadow-gold: 0 14px 44px rgba(194,160,90,0.22);\n}\n\n@media (prefers-color-scheme: dark) {\n  :root:not([data-theme=\"light\"]) {\n    --bg: var(--carvao-900); --surface: var(--carvao-800);\n    --surface-2: var(--carvao-700); --card: var(--carvao-800);\n    --border: var(--carvao-600); --border-strong: #56493A;\n    --fg1: #F3ECDD; --fg2: #C9BFA9; --fg3: #97907E;\n    --accent: var(--toca-gold); --accent-quiet: var(--toca-gold-soft);\n    --link: var(--oceano-300);\n    --band: var(--carvao-900);\n    --ocean: var(--oceano-300); --nature: var(--natureza-300); --sunset: var(--sol-300);\n    --on-accent: var(--carvao-900);\n    --shadow-md: 0 10px 28px rgba(0,0,0,0.5);\n    --shadow-lg: 0 28px 64px rgba(0,0,0,0.6);\n  }\n}\n\n/* ============================================================\n   Base semantic element styles\n   ============================================================ */\nbody {\n  background: var(--bg);\n  color: var(--fg1);\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  li [-26.9712,-48.6238],\n        desc:\"Piscina, 3 bares, sofás bistró y carpa cristal en Praia Brava. Grandes shows en temporada.\" },\n      { id:\"habbitat\", city:\"bc\", cat:\"beachclub\", name:\"Habbitat Beach Club\", sub:\"All day living\", stars:\"★★★★☆\",\n        addr:\"Av. José Medeiros Vieira, 704 — Praia Brava\", coord:[-26.9695,-48.6242],\n        desc:\"Nuevo espacio para 1.500 personas. Gastronomía elaborada y fiestas electrónicas de gran porte.\" },\n      { id:\"brava\", city:\"bc\", cat:\"praia\", name:\"Praia Brava\", sub:\"Praia · a pasos de la casa\", stars:\"★★★★★\",\n        addr:\"Itajaí\", coord:[-26.9685,-48.6225],\n        desc:\"La playa más movida de la región. Olas para surf y orla repleta de bares, restaurantes y beach clubs.\" },\n      { id:\"central\", city:\"bc\", cat:\"praia\", name:\"Praia Central / Av. Atlântica\", sub:\"Orla\", stars:\"★★★★☆\",\n        addr:\"Balneário Camboriú\", coord:[-26.9900,-48.6302],\n        desc:\"El cartón postal de BC. La Av. Atlántica concentra los bares y restaurantes, animada día y noche.\" },\n\n      { id:\"tribus\", city:\"bc\", cat:\"bar\", name:\"Tribus Bar\", sub:\"Pub Rock · shows ao vivo\", stars:\"★★★★☆\",\n        addr:\"Balneário Camboriú\", coord:[-26.9925,-48.6345],\n        desc:\"Pub de rock de BC con shows en vivo de miércoles a sábado. Bandas de rock y pop rock, ambiente animado.\" },\n      { id:\"porao\", city:\"bc\", cat:\"show\", name:\"Porão Comedy Club\", sub:\"Comédia · qua–dom\", stars:\"★★★★☆\",\n        addr:\"Balneário Camboriú\", coord:[-26.9908,-48.6322],\n        desc:\"Stand-up de miércoles a domingo. Buena opción para reír en un ambiente relajado antes de la balada.\" },\n\n      // ---- Florianópolis ----\n      { id:\"stage\", city:\"flp\", cat:\"boate\", name:\"Stage Music Park\", sub:\"Shows & Balada\", stars:\"★★★★★\",\n        addr:\"Jurerê Internacional\", coord:[-27.4385,-48.4955],\n        desc:\"La mayor casa de shows de Floripa. Recibió a Amy Winehouse, G Cave: carta de vinos destacada. Rabodigalo: tragos de autor. Puntos del happy hour.\" },\n      { id:\"ostra\", city:\"flp\", cat:\"restaurante\", name:\"Ostradamus\", sub:\"Ostras & frutos del mar\", stars:\"★★★★★\",\n        addr:\"Lagoa da Conceição\", coord:[-27.6160,-48.4630],\n        desc:\"Ostras cultivadas localmente, a la orilla de la laguna. Carta de vinos sofisticada.\" },\n      { id:\"jay\", city:\"flp\", cat:\"restaurante\", name:\"Jay Bistrô\", sub:\"Alta gastronomía\", stars:\"★★★★★\",\n        addr:\"Av. dos Búzios, 1760 — Jurerê\", coord:[-27.4360,-48.4900],\n        desc:\"12 años en Jurerê. Referencia en alta gastronomía con ingredientes nobles y creatividad.\" },\n      { id:\"villa\", city:\"flp\", cat:\"restaurante\", name:\"Villa Maggioni\", sub:\"Italiano\", stars:\"★★★★★\",\n        addr:\"Lagoa da Conceição\", coord:[-27.6050,-48.4660],\n        desc:\"Cocina italiana auténtica en ambiente íntimo a la orilla de la Lagoa.\" },\n      { id:\"p12\", city:\"flp\", cat:\"beachclub\", name:\"Parador P12\", sub:\"Beach Club\", stars:\"★★★★★\",\n        addr:\"Jurerê Internacional\", coord:[-27.4380,-48.4940],\n        desc:\"El beach club más famoso de Jurerê. Empieza de día y se vuelve balada. Público bonito y line-up de peso.\" },\n      { id:\"donna\", city:\"flp\", cat:\"beachclub\", name:\"Donna Jurerê\", sub:\"Beach Club\", stars:\"★★★★★\",\n        addr:\"Jurerê Internacional\", coord:[-27.4383,-48.4960],\n        desc:\"Fusión de música y gastronomía. Del almuerzo a la noche, una de las pedidas de la temporada.\" },\n      { id:\"jurere\", city:\"flp\", cat:\"praia\", name:\"Jurerê Internacional\", sub:\"Praia / Bairro\", stars:\"★★★★★\",\n        addr:\"Florianópolis\", coord:[-27.4385,-48.4950],\n        desc:\"La principal playa de fiestas de Floripa. Beach clubs sofisticados y casas nocturnas — el 'Mykonos brasileño'.\" },\n      { id:\"lagoa\", city:\"flp\", cat:\"praia\", name:\"Lagoa da Conceição\", sub:\"Bairro / Lagoa\", stars:\"★★★★★\",\n        addr:\"Florianópolis\", coord:[-27.6030,-48.4660],\n        desc:\"Atmósfera vibrante y bohemia. Bistrós modernos, frutos del mar, bares y shows de rock.\" },\n      { id:\"theroof\", city:\"flp\", cat:\"bar\", name:\"The Roof\", sub:\"Rooftop Lounge\", stars:\"★★★★★\",\n        addr:\"Majestic Palace Hotel — Beira-mar Norte\", coord:[-27.5820,-48.5530],\n        desc:\"Rooftop con vista deslumbrante y ambiente sofisticado. Ideal para empezar la noche o una balada exclusiva.\" },\n      { id:\"deraiz\", city:\"flp\", cat:\"bar\", name:\"Bar DeRaiz\", sub:\"Música ao vivo · eclético\", stars:\"★★★★☆\",\n        addr:\"Lagoa da Conceição\", coord:[-27.6040,-48.4665],\n        desc:\"Programación musical ecléctica y shows en vivo. Vibrante de jueves a domingo.\" },\n      { id:\"cafelamusique\", city:\"flp\", cat:\"beachclub\", name:\"Café de La Musique\", sub:\"Sunset & DJs\", stars:\"★★★★★\",\n        addr:\"Jurerê Internacional\", coord:[-27.4378,-48.4930],\n        desc:\"Sunsets y eventos con DJs de jueves a domingo en Jurerê. Excelente opción para el feriado.\" },\n    ];\n\n    const ROTEIRO = [\n      { date:\"17/11 · Terça\", title:\"Chegada a BC\", lines:[\n        \"Tarde: chegada, passeio na Praia Central e Av. Atlântica.\",\n        \"Jantar: Porto Camarões ou O Pharol Gourmet (frutos do mar).\",\n        \"Noite: drinks no Chaplin Bar (beira-mar) + Taj Bar para fechar.\" ]},\n      { date:\"18/11 · Quarta\", title:\"Praia Brava\", lines:[\n        \"Manhã/tarde: Praia Brava — surf e trilha do Morro do Farol.\",\n        \"Tarde: Belvedere ou Habbitat Beach Club (verificar programação).\",\n        \"Noite: Warung Beach Club (confirmar data em warungclub.com).\" ]},\n      { date:\"19/11 · Quinta\", title:\"Gastronomia & Bares\", lines:[\n        \"Jantar especial: Number Seven ou Lucca Bistrô (alta gastro).\",\n        \"Pré-balada no Guacamole (drinks mexicanos).\",\n        \"Balada: Shed Western Bar ou checar agenda do Green Valley.\" ]},\n      { date:\"20/11 · Sexta\", title:\"Green Valley\", lines:[\n        \"Dia: descanso, Cristo Luz ou FG Big Wheel (passeio noturno).\",\n        \"Jantar leve: Guacamole ou Depósito Cocktail Bar.\",\n        \"Noite: Green Valley (abertura ~23h — confirmar programação).\" ]},\n      { date:\"21/11 · Sábado\", title:\"Transfer para Florianópolis\", lines:[\n        \"Manhã: Parque Unipraias ou teleférico.\",\n        \"Transfer para Floripa (~1h30). Chegada na Lagoa da Conceição.\",\n        \"Tarde: Bar do Boni (pôr do sol) + Ostradamus para jantar.\",\n        \"Noite: Parador P12 ou Donna Jurerê → Milk Club ou Stage.\" ]},\n      { date:\"22/11 · Domingo\", title:\"Florianópolis & partida\", lines:[\n        \"Manhã: Mercado Público — café e o clássico Box 32.\",\n        \"Almoço: Jay Bistrô (Jurerê) ou Villa Maggioni (Lagoa).\",\n        \"Última noite: Santa Club ou John Bull para o fechamento.\" ]},\n    ];\n    const TIPS = [\n      \"Use apps de transporte à noite\",\n      \"Compre ingressos antecipados em nov.\",\n      \"Dress code arrumado em Jurerê / Milk\",\n      \"Green Valley abre ~23h\",\n      \"Milk Club: pulseira de crédito\",\n      \"Agendas: greenvalleybr.com · warungclub.com\",\n    ];\n\n    const CITIES = {\n      bc:  { label: \"Balneário\", center: [-26.985, -48.632], zoom: 13, title: \"Balneário Camboriú · Alrededores\" },\n      flp: { label: \"Floripa\",   center: [-27.520, -48.475], zoom: 11, title: \"Florianópolis · Jurerê & Lagoa\" },\n    };\n\n    // ---- Map ----\n    const map = L.map(\"map\", { zoomControl: true, scrollWheelZoom: true }).setView(CITIES.bc.center, CITIES.bc.zoom);\n    L.tileLayer(\"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png\", {\n      attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: \"abcd\", maxZoom: 19,\n    }).addTo(map);\n    const layer = L.layerGroup().addTo(map);\n\n    function mkHTML(cat) {\n      const c = CATS[cat];\n      return `<div class=\"${cat === \"casa\" ? \"mk mk-casa\" : \"mk\"}\" style=\"background:${c.color}\"><i data-lucide=\"${c.icon}\"><\u002Fi><\u002Fdiv>`;\n    }\n    function popHTML(p) {\n      const c = CATS[p.cat];\n      return `\n        <div class=\"pop-cat\" style=\"color:${c.color}\"><i data-lucide=\"${c.icon}\" style=\"width:13px;height:13px\"><\u002Fi> ${c.label}<\u002Fdiv>\n        <div class=\"pop-name\">${p.name}<\u002Fdiv>\n        <div class=\"pop-rating\">${p.stars ? p.stars + \" · \" : \"\"}${p.sub}<\u002Fdiv>\n        <div class=\"pop-desc\">${p.desc}<\u002Fdiv>\n        <div class=\"pop-addr\"><i data-lucide=\"map-pin\" style=\"width:13px;height:13px;flex:none\"><\u002Fi> ${p.addr}<\u002Fdiv>\n        ${p.immersive ? `<button class=\"pop-imm\" onclick=\"openImmersive()\"><i data-lucide=\"orbit\" style=\"width:14px;height:14px\"><\u002Fi> Navegación inmersiva 3D<\u002Fbutton>` : \"\"}`;\n    }\n\n    let city = \"bc\", cat = \"todos\", activeId = null;\n    const markers = {};\n\n    function buildMarkers() {\n      layer.clearLayers();\n      Object.keys(markers).forEach((k) => delete markers[k]);\n      PLACES.filter((p) => p.city === city)\n        .filter((p) => cat === \"todos\" || p.cat === cat)\n        .forEach((p) => {\n        const icon = L.divIcon({ html: mkHTML(p.cat), className: \"\",\n          iconSize: p.cat === \"casa\" ? [46,46] : [36,36], iconAnchor: p.cat === \"casa\" ? [23,23] : [18,18] });\n        const m = L.marker(p.coord, { icon }).addTo(layer);\n        m.bindPopup(popHTML(p), { className: \"toca-pop\", minWidth: 230, maxWidth: 290, offset: [0,-8] });\n        m.on(\"popupopen\", () => { lucide.createIcons(); activeId = p.id; renderList(); });\n        markers[p.id] = m;\n      });\n      lucide.createIcons();\n    }\n\n    // ---- Cities ----\n    const citiesEl = document.getElementById(\"cities\");\n    [[\"bc\",\"Balneário Camboriú\"],[\"flp\",\"Florianópolis\"],[\"roteiro\",\"Roteiro 17–22\"]].forEach(([key,label]) => {\n      const b = document.createElement(\"button\");\n      b.className = \"sb-city\" + (key === \"bc\" ? \" on\" : \"\");\n      b.textContent = label;\n      b.onclick = () => selectCity(key, b);\n      citiesEl.appendChild(b);\n    });\n\n    const catsEl = document.getElementById(\"cats\");\n    const listEl = document.getElementById(\"list\");\n    const roteiroEl = document.getElementById(\"roteiro\");\n    const searchEl = document.getElementById(\"search\");\n    const titleEl = document.getElementById(\"mapTitle\");\n\n    function selectCity(key, btn) {\n      [...citiesEl.children].forEach((c) => c.classList.remove(\"on\"));\n      btn.classList.add(\"on\");\n      if (key === \"roteiro\") {\n        catsEl.style.display = \"none\"; listEl.style.display = \"none\";\n        document.querySelector(\".sb-search\").style.display = \"none\";\n        roteiroEl.style.display = \"block\"; renderRoteiro(); document.getElementById(\"immFab\").style.display = \"none\"; return;\n      }\n      document.querySelector(\".sb-search\").style.display = \"block\";\n      catsEl.style.display = \"flex\"; listEl.style.display = \"block\"; roteiroEl.style.display = \"none\";\n      city = key; cat = \"todos\"; activeId = null;\n      titleEl.textContent = CITIES[key].title;\n      map.flyTo(CITIES[key].center, CITIES[key].zoom, { duration: .8 });\n      buildMarkers(); renderCats(); renderList(); syncImmFab();\n    }\n\n    // ---- Category chips ----\n    function renderCats() {\n      catsEl.innerHTML = \"\";\n      const present = [...new Set(PLACES.filter((p) => p.city === city).map((p) => p.cat))];\n      const order = [\"todos\",\"boate\",\"bar\",\"show\",\"restaurante\",\"beachclub\",\"praia\",\"casa\"];\n      order.filter((k) => k === \"todos\" || present.includes(k)).forEach((k) => {\n        const b = document.createElement(\"button\");\n        b.className = \"sb-cat\" + (k === cat ? \" on\" : \"\");\n        b.textContent = k === \"todos\" ? \"Todos\" : CATS[k].label;\n        b.onclick = () => { cat = k; buildMarkers(); renderCats(); renderList(); };\n        catsEl.appendChild(b);\n      });\n    }\n\n    // ---- List ----\n    function renderList() {\n      const q = searchEl.value.trim().toLowerCase();\n      listEl.innerHTML = \"\";\n      PLACES.filter((p) => p.city === city)\n        .filter((p) => cat === \"todos\" || p.cat === cat)\n        .filter((p) => !q || p.name.toLowerCase().includes(q) || p.sub.toLowerCase().includes(q) || (p.addr||\"\").toLowerCase().includes(q))\n        .forEach((p) => {\n          const c = CATS[p.cat];\n          const item = document.createElement(\"div\");\n          item.className = \"sb-item\" + (p.id === activeId ? \" on\" : \"\");\n          item.innerHTML = `\n            <div class=\"sb-ic\" style=\"background:${c.color}26;color:${c.color}\"><i data-lucide=\"${c.icon}\"><\u002Fi><\u002Fdiv>\n            <div class=\"sb-meta\">\n              <div class=\"sb-name\">${p.name}<\u002Fdiv>\n              <div class=\"sb-sub\">${p.stars ? p.stars + \" · \" : \"\"}${p.sub}<\u002Fdiv>\n              ${p.addr ? `<div class=\"sb-addr\">${p.addr}<\u002Fdiv>` : \"\"}\n            <\u002Fdiv>`;\n          item.onclick = () => {\n            activeId = p.id; renderList();\n            map.flyTo(p.coord, p.cat === \"casa\" ? 15 : 15, { duration: .8 });\n            if (markers[p.id]) markers[p.id].openPopup();\n          };\n          listEl.appendChild(item);\n        });\n      lucide.createIcons();\n    }\n    searchEl.addEventListener(\"input\", renderList);\n\n    // ---- Roteiro ----\n    function renderRoteiro() {\n      titleEl.textContent = \"Roteiro · 17–22 de novembro\";\n      roteiroEl.innerHTML = `<div class=\"rt-note\"><i data-lucide=\"calendar\" style=\"width:16px;height:16px;flex:none;color:var(--accent)\"><\u002Fi><span>Roteiro sugerido para o feriado. Confirme a agenda de Green Valley e Warung nos respectivos sites — em novembro algumas atrações têm horário reduzido.<\u002Fspan><\u002Fdiv>`;\n      ROTEIRO.forEach((d) => {\n        const el = document.createElement(\"div\");\n        el.className = \"rt-day\";\n        el.innerHTML = `\n          <div class=\"rt-head\"><span class=\"rt-date\">${d.date}<\u002Fspan><\u002Fdiv>\n          <div class=\"rt-title\">${d.title}<\u002Fdiv>\n          ${d.lines.map((l) => `<div class=\"rt-line\"><span class=\"rt-dot\"><\u002Fspan><span>${l}<\u002Fspan><\u002Fdiv>`).join(\"\")}`;\n        roteiroEl.appendChild(el);\n      });\n      const tips = document.createElement(\"div\");\n      tips.className = \"rt-tips\";\n      tips.innerHTML = TIPS.map((t) => `<span class=\"rt-chip\"><i data-lucide=\"check\" style=\"width:12px;height:12px\"><\u002Fi> ${t}<\u002Fspan>`).join(\"\");\n      roteiroEl.appendChild(tips);\n      lucide.createIcons();\n    }\n\n    // ---- Immersive view (Google Maps) ----\n    const HOUSE = PLACES.find((p) => p.id === \"casa\");\n    const HOUSE_Q = encodeURIComponent(\"Rua Plínio Salgado, 32 - Praia dos Amores, Balneário Camboriú - SC\");\n    const overlay = document.getElementById(\"immOverlay\");\n    const immFrame = document.getElementById(\"immFrame\");\n    const immOpen = document.getElementById(\"immOpen\");\n    const [hlat, hlng] = HOUSE.coord;\n\n    const IMM_SRC = {\n      aerial: `https://maps.google.com/maps?q=${HOUSE_Q}&t=k&z=18&hl=es&output=embed`,\n      street: `https://maps.google.com/maps?layer=c&cbll=${hlat},${hlng}&cbp=11,0,0,0,0&output=svembed`,\n    };\n    // Deep-link to Google Maps immersive / aerial 3D for the house location\n    immOpen.href = `https://www.google.com/maps/search/?api=1&query=${HOUSE_Q}`;\n\n    function setImmMode(mode, btn) {\n      document.querySelectorAll(\".imm-tab\").forEach((t) => t.classList.remove(\"on\"));\n      if (btn) btn.classList.add(\"on\");\n      immFrame.src = IMM_SRC[mode];\n    }\n    function openImmersive() {\n      overlay.classList.add(\"on\");\n      overlay.setAttribute(\"aria-hidden\", \"false\");\n      document.querySelectorAll(\".imm-tab\").forEach((t, i) => t.classList.toggle(\"on\", i === 0));\n      immFrame.src = IMM_SRC.aerial;\n      setTimeout(() => lucide.createIcons(), 50);\n    }\n    function closeImmersive() {\n      overlay.classList.remove(\"on\");\n      overlay.setAttribute(\"aria-hidden\", \"true\");\n      setTimeout(() => { immFrame.src = \"about:blank\"; }, 400);\n    }\n    window.openImmersive = openImmersive;\n    window.closeImmersive = closeImmersive;\n    window.setImmMode = setImmMode;\n    document.addEventListener(\"keydown\", (e) => { if (e.key === \"Escape\") closeImmersive(); });\n\n    // Hide the immersive FAB on cities without the house (Floripa)\n    function syncImmFab() {\n      document.getElementById(\"immFab\").style.display = (city === \"bc\") ? \"inline-flex\" : \"none\";\n    }\n\n    // ---- Legend ----\n    const legendEl = document.getElementById(\"legend\");\n    Object.values(CATS).forEach((c) => {\n      const s = document.createElement(\"span\");\n      s.innerHTML = `<i style=\"background:${c.color}\"><\u002Fi> ${c.label}`;\n      legendEl.appendChild(s);\n    });\n\n    buildMarkers(); renderCats(); renderList(); syncImmFab();\n    setTimeout(() => lucide.createIcons(), 300);\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
